<html lang="en">
<head>

    <meta content="Aerosimo" name="application-name">
    <meta content="IE=edge" http-equiv="X-UA-Compatible">
    <meta content="Aerosimo IT Consultancy" name="description">
    <meta content="Aerosimo" name="apple-mobile-web-app-title">
    <meta content="Oracle, Java, Tomcat, Maven, Jenkins, Bitbucket, Github" name="keywords">
    <meta content="width=device-width, initial-scale=1, user-scalable=no" maximum-scale=1.0" minimum-scale=1.0,
          name="viewport"/>
    <!-- Title -->
    <title>Forgot Password | Family Profile Manager | Aerosimo Ltd</title>
    <!-- Favicon-->
    <link href="assets/img/icons/favicon.ico" rel="shortcut icon"/>
    <link href="assets/img/icons/favicon.ico" rel="icon" type="image/x-icon">
    <link href="assets/img/icons/favicon-32x32.png" rel="icon" sizes="32x32" type="image/png">
    <link href="assets/img/icons/favicon-16x16.png" rel="icon" sizes="16x16" type="image/png">
    <link href="assets/img/icons/apple-touch-icon.png" rel="apple-touch-icon" sizes="180x180">
    <link href="assets/img/icons/android-chrome-192x192.png" rel="android-chrome" sizes="192x192">
    <!-- CSS Files -->
    <link href="assets/css/auth.css" rel="stylesheet"/>
    <!-- CSS Files -->
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
          integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" rel="stylesheet">
</head>
</head>

<body>

<section class="login">
    <div class="login_box">
        <div class="left">

            <div class="contact">
                <form action="forgot" method="POST">
                    <img alt="logo icon" src="assets/img/icons/logo-icon.png">
                    <br><br><br>
                    <label for="email">Email</label>
                    <input
                            autocomplete="off"
                            class="form-control"
                            id="email"
                            name="email"
                            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                            placeholder="Enter your email"
                            required
                            title="Characters followed by an @ sign, followed by more characters. Must be in the following order: characters@characters.domain"
                            type="text"
                    />
                    <button class="submit">LET'S GO</button>
                </form>
            </div>
        </div>
        <div class="right">
            <div class="right-text">
                <h2>Family Profile Manager</h2>
                <h5>FORGOT | Confirm your email address 🎫</h5>
            </div>
        </div>
    </div>
</section>

</body>

</html>
